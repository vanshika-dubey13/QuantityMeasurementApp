spring.application.name=QuantityMeasurementApp

# ===============================
# MySQL Database Configuration
# ===============================

# ================================
# Connect to MySQL
#
# DB name = quantity_measurement_db
# Port = 3306
#
# ==================================
 

spring.datasource.url=jdbc:mysql://localhost:3306/quantity_measurement_db
spring.datasource.username=root
spring.datasource.password=root


# Spring uses this to:
#  -> Load JDBC driver
#  -> Establish connection
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# ===============================
# JPA / Hibernate Configuration
# ===============================

# Hibernate dialect -> tells Hibernate how to generate SQL
# Different DBs = different SQL syntax
# This ensures compatibility with MySQL
# Without hibernate , we have to write manually sql queires as well as java code for controlling, fetching, maniouating data
spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect

#  Controls table creation strategy:
# create      -> drops & recreates tables every run  (dangerous)
# update      -> updates schema automatically  (safe for dev)
# validate    -> checks schema only
# none        -> no changes
spring.jpa.hibernate.ddl-auto=update

#  Prints SQL queries in console (very useful for debugging)
spring.jpa.show-sql=true

#  Prints SQL queries in console (very useful for debugging)
spring.jpa.properties.hibernate.format_sql=true

# ===============================
# Server Configuration
# ===============================

server.port=8080

# ===============================
# Swagger Config
# ===============================

#  Endpoint where Swagger JSON is generated
springdoc.api-docs.path=/v3/api-docs
springdoc.swagger-ui.path=/swagger-ui.html


spring.security.oauth2.client.registration.google.client-id=${GOOGLE_CLIENT_ID}
spring.security.oauth2.client.registration.google.client-secret=${GOOGLE_CLIENT_SECRET}
spring.security.oauth2.client.registration.google.scope=email,profile
# =============================================================
# Quantity Measurement Application - Development Configuration
# =============================================================

# Application name and active profile
spring.application.name=quantity-measurement-app
spring.profiles.active=dev

# =============================================================
# H2 In-Memory Database Configuration (Development)
# Using in-memory H2 for ease of development and testing.
# The H2 console is enabled for direct database inspection.
# =============================================================
spring.datasource.url=jdbc:h2:mem:quantitymeasurementdb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=root
spring.datasource.password=root

# =============================================================
# Spring Data JPA / Hibernate Configuration
# create-drop: schema is created on startup and dropped on shutdown
# Appropriate for in-memory H2 in development; use 'validate' in prod
# =============================================================
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# =============================================================
# H2 Console Configuration
# Enables the web-based H2 console at /h2-console
# Access: http://localhost:8080/h2-console
# JDBC URL: jdbc:h2:mem:quantitymeasurementdb
# Username: sa  |  Password: (leave blank)
# =============================================================
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console
spring.h2.console.settings.web-allow-others=false

# =============================================================
# Connection Pool Settings (HikariCP — Spring Boot default)
# =============================================================
spring.datasource.hikari.maximum-pool-size=10
spring.datasource.hikari.minimum-idle=2
spring.datasource.hikari.connection-timeout=30000
spring.datasource.hikari.idle-timeout=600000
spring.datasource.hikari.max-lifetime=1800000
spring.datasource.hikari.pool-name=QuantityMeasurementPool

# =============================================================
# Logging Configuration
# DEBUG for application and Spring web/Hibernate SQL in development
# =============================================================
logging.level.root=INFO
logging.level.com.app.quantitymeasurement=DEBUG
logging.level.org.springframework.web=DEBUG
logging.level.org.hibernate.SQL=DEBUG
logging.level.org.hibernate.type.descriptor.sql.BasicBinder=TRACE
logging.pattern.console=%d{yyyy-MM-dd HH:mm:ss} - %logger{36} - %msg%n

# =============================================================
# Swagger / OpenAPI Configuration
# Swagger UI: http://localhost:8080/swagger-ui.html
# OpenAPI JSON: http://localhost:8080/v3/api-docs
# =============================================================
springdoc.api-docs.path=/v3/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.swagger-ui.enabled=true

# =============================================================
# Spring Boot Actuator Configuration
# Health, metrics, and info endpoints for monitoring
# =============================================================
management.endpoints.web.exposure.include=health,info,metrics
management.endpoint.health.show-details=always
management.info.env.enabled=true
info.app.name=Quantity Measurement App
info.app.version=17.0
info.app.description=Spring Boot REST API for quantity measurement operations
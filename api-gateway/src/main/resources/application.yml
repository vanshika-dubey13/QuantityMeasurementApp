server:
  port: 8080

spring:
  application:
    name: api-gateway

  cloud:
    gateway:

      # 🌐 GLOBAL CORS (ONLY HERE, not in services)
      globalcors:
        corsConfigurations:
          '[/**]':
            allowedOrigins:
              - "http://localhost:5173"
            allowedMethods:
              - GET
              - POST
              - PUT
              - DELETE
              - OPTIONS
            allowedHeaders: "*"
            allowCredentials: true

      routes:

        # 🔐 USER AUTH (Signup/Login)
        - id: user-service-route
          uri: http://localhost:8081
          predicates:
            - Path=/auth/**

        # 🔐 GOOGLE OAUTH (VERY IMPORTANT 🚨)
        - id: google-oauth-route
          uri: http://localhost:8081
          predicates:
            - Path=/oauth2/**, /login/oauth2/**

        # 📏 MEASUREMENT SERVICE
        - id: measurement-service-route
          uri: http://localhost:8082
          predicates:
            - Path=/api/v1/quantities/**

eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka/

  instance:
    hostname: localhost
    prefer-ip-address: true
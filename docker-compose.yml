services:
  # 1. MySQL Database
  mysql-db:
    image: mysql:8.0
    container_name: mysql-db
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: quantity_measurement_db
    ports:
      - "3307:3306"
    volumes:
      - db-data:/var/lib/mysql 
    networks:
      - qma-network
    # Upgraded healthcheck to ensure it can actually log in before declaring "healthy"
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-proot"]
      interval: 10s
      timeout: 5s
      retries: 10 

  # 2. Eureka Server
  eureka-server:
    build: 
      context: .
      dockerfile: eureka-server/Dockerfile
    container_name: eureka-server
    ports:
      - "8761:8761"
    networks:
      - qma-network
    restart: on-failure

  # 3. User Service
  user-service:
    build: 
      context: .
      dockerfile: user-service/Dockerfile
    container_name: user-service
    ports:
      - "8081:8081"
    environment:
      # Added allowPublicKeyRetrieval=true to fix the CachingSha2PasswordPlugin crash
      - SPRING_DATASOURCE_URL=jdbc:mysql://mysql-db:3306/quantity_measurement_db?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
      - SPRING_DATASOURCE_USERNAME=root
      - SPRING_DATASOURCE_PASSWORD=root
      - EUREKA_CLIENT_SERVICEURL_DEFAULTZONE=http://eureka-server:8761/eureka/
    depends_on:
      mysql-db:
        condition: service_healthy
      eureka-server:
        condition: service_started
    networks:
      - qma-network
    restart: on-failure

  # 4. Measurement Service
  measurement-service:
    build: 
      context: .
      dockerfile: measurement-service/Dockerfile
    container_name: measurement-service
    ports:
      - "8082:8082"
    environment:
      # Added allowPublicKeyRetrieval=true to fix the CachingSha2PasswordPlugin crash
      - SPRING_DATASOURCE_URL=jdbc:mysql://mysql-db:3306/quantity_measurement_db?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
      - SPRING_DATASOURCE_USERNAME=root
      - SPRING_DATASOURCE_PASSWORD=root
      - EUREKA_CLIENT_SERVICEURL_DEFAULTZONE=http://eureka-server:8761/eureka/
    depends_on:
      mysql-db:
        condition: service_healthy
      eureka-server:
        condition: service_started
    networks:
      - qma-network
    restart: on-failure

  # 5. API Gateway
  api-gateway:
    build: 
      context: .
      dockerfile: api-gateway/Dockerfile
    container_name: api-gateway
    ports:
      - "8080:8080"
    environment:
      - EUREKA_CLIENT_SERVICEURL_DEFAULTZONE=http://eureka-server:8761/eureka/
    depends_on:
      eureka-server:
        condition: service_started
    networks:
      - qma-network
    restart: on-failure

  # 6. React Frontend
  frontend:
    # This path navigates from your backend folder directly to your frontend folder!
    build: ../../AppDevelopmentFrontend/AppDevelopmentFrontend/quantity-measurement-frontend
    container_name: qma-frontend
    ports:
      - "5173:5173" 
    depends_on:
      - api-gateway
    networks:
      - qma-network
    restart: on-failure

networks:
  qma-network:
    driver: bridge

volumes:
  db-data: